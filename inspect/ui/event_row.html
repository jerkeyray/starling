{{define "event_row.html" -}}
<li class="ev ev-{{.Family}}{{if .Active}} active{{end}}"
    data-seq="{{.Seq}}"
    {{if .CallID}}data-callid="{{.CallID}}"{{end}}>
  <a href="#"
     hx-get="{{.DetailURL}}"
     hx-target="#detail"
     hx-swap="innerHTML"
     hx-on:click="document.querySelectorAll('#timeline .ev').forEach(n=>n.classList.remove('active'));this.parentElement.classList.add('active')">
    <span class="ev-seq">{{.SeqLabel}}</span>
    <span class="ev-time">{{.Time}}</span>
    <span class="ev-kind">{{.Kind}}</span>
    <span class="ev-summary">{{.Summary}}</span>
  </a>
</li>
{{- end}}
