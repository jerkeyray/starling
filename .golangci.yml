version: "2"

# golangci-lint configuration (v2 schema).
#
# Conservative linter set — enough to catch the classes of drift this
# repo has actually suffered (gofmt drift, swallowed errors, stale
# docstrings on exported API), without churning the codebase on
# opinionated style rules.

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - errcheck
    - gosec
    - revive
    - unused
    - ineffassign
    - misspell
  settings:
    revive:
      rules:
        # Keep the exported-doc rule: catches future API drift.
        - name: exported
          severity: warning
          disabled: false
        # Too noisy for interface implementations.
        - name: unused-parameter
          disabled: true
        - name: package-comments
          disabled: true
    errcheck:
      # These are idiomatic "fire and forget" calls — checking the
      # return value buys nothing and clutters every call site.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (*database/sql.Rows).Close
        - (io.Closer).Close
    gosec:
      excludes:
        # G104 overlaps with errcheck; let errcheck own it.
        - G104
    misspell:
      locale: US
  exclusions:
    paths:
      - examples
      - internal
    rules:
      # Test helpers don't need godoc on every exported symbol.
      - path: _test\.go
        linters:
          - revive
        text: exported
      # Fuzz/bench scaffolding sometimes has intentionally-ignored errs.
      - path: _test\.go
        linters:
          - errcheck

# Formatters (gofmt/goimports) moved out of `linters` in v2.
formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
