name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Base job: in-memory + SQLite tests, no external services.
  # Matrixed across `stable` (track the ecosystem) and the pinned
  # floor in go.mod (catch toolchain-sensitive breakage early).
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ['stable', '1.26.2']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - run: go mod download
      - run: go vet ./...
      - run: go build ./...
      # -count=10 surfaces races the single-count default has missed
      # in this repo before. Suite runs in ~8s locally; 10× fits well
      # under a minute on a CI runner.
      - run: go test -race -count=10 ./...

  # golangci-lint — conservative set configured in .golangci.yml.
  # Non-blocking for now: findings show up as annotations but a red
  # lint run doesn't fail CI. Flip `continue-on-error` to false once
  # the backlog of warnings is worked down.
  lint:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - uses: golangci/golangci-lint-action@v7
        with:
          # v2 is required: v1 binaries are built against Go 1.23/1.24
          # and refuse to load a module targeting Go 1.26.
          version: latest

  # govulncheck — reachability-aware scan of stdlib + deps.
  vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...

  # gofmt drift guard. Double-covered by golangci-lint's gofmt linter
  # but kept as a separate one-liner so failures are obvious.
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: gofmt -l
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "The following files are not gofmt-clean:"
            echo "$out"
            exit 1
          fi

  # Postgres matrix: runs only the eventlog package's tests, once per
  # supported Postgres major version. The PG_EVENTLOG_TEST env var
  # gates the Postgres-backed paths — unset it, and every Postgres
  # test skips. Set here, the contract suite picks up a third backend
  # and the Postgres-specific concurrency tests run.
  test-postgres:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        postgres: ['14', '15', '16']
    services:
      postgres:
        image: postgres:${{ matrix.postgres }}-alpine
        env:
          POSTGRES_USER: starling
          POSTGRES_PASSWORD: starling
          POSTGRES_DB: starling_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U starling"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PG_EVENTLOG_TEST: postgres://starling:starling@localhost:5432/starling_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - run: go mod download
      - run: go test -race -count=1 ./eventlog
